# CI brána (D-075): lint + typecheck + vitest + ETL pytest na každý push/PR.
# LLM evaly (npm run eval) tu nebeží — potrebujú dev server + DB (kadencia D-057).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Lint, typecheck & test (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  etl:
    name: ETL tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: etl/requirements-dev.txt
      - run: pip install -r etl/requirements-dev.txt
      - run: python -m pytest etl/tests -q
